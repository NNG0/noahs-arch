close_when_open = true
theme = "noahs-arch"
theme_base = []
theme_location = ["~/.config/walker/themes"]
hotreload_theme = true


[builtins.finder]
name = "finder"
icon = "folder"
placeholder = "Finder"
switcher_only = true
ignore_gitignore = true
refresh = true
concurrency = 8
preview_images = false
use_fd = true
fd_flags = "--ignore-vcs --type file --type directory"
cmd_alt = 'xdg-open "$(dirname "$HOME/%RESULT%")"'


[builtins.clipboard]
name = "clipboard"
icon = "user-bookmarks"
placeholder = "Clipboard"
switcher_only = true
always_put_new_on_top = true
avoid_line_breaks = true
image_height = 300
max_entries = 10
exec = "wl-copy"
hidden = false
